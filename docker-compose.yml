services:
  postgres:
    image: postgres:16-alpine
    container_name: socket_vdash_postgres
    environment:
      POSTGRES_DB: socket_vdash
      POSTGRES_USER: socket
      POSTGRES_PASSWORD: socket123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socket"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.0
    container_name: socket_vdash_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  collector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: socket_vdash_collector
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: socket123
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
